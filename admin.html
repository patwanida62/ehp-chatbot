<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EHP Chatbot — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }

    header {
      background: #06c755;
      color: white;
      padding: 16px 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 20px; font-weight: 600; }
    header span { font-size: 13px; opacity: 0.85; }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 20px 32px 0;
      max-width: 760px;
      margin: 0 auto;
    }
    .tab-btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px 8px 0 0;
      background: #dde1e7;
      color: #555;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active { background: white; color: #06c755; }

    main { max-width: 760px; margin: 0 auto; padding: 0 32px 32px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .card {
      background: white;
      border-radius: 0 12px 12px 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }
    .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #111; }

    /* Keywords */
    .add-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .add-row input {
      flex: 1; padding: 10px 14px;
      border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 14px; outline: none; transition: border 0.2s;
    }
    .add-row input:focus { border-color: #06c755; }
    .btn-green {
      padding: 10px 20px; background: #06c755; color: white;
      border: none; border-radius: 8px; font-size: 14px;
      cursor: pointer; font-weight: 600; transition: background 0.2s;
    }
    .btn-green:hover { background: #05a847; }

    #keyword-list { display: flex; flex-direction: column; gap: 8px; }
    .keyword-item {
      display: flex; align-items: center; justify-content: space-between;
      background: #f8f9fa; border: 1px solid #e9ecef;
      border-radius: 8px; padding: 10px 14px; font-size: 14px;
    }
    .keyword-item .badge {
      background: #e8f8ee; color: #06c755;
      font-size: 11px; padding: 2px 8px;
      border-radius: 99px; margin-left: 8px; font-weight: 600;
    }
    .keyword-item .del-btn {
      background: none; border: none; color: #ccc;
      font-size: 20px; cursor: pointer; transition: color 0.2s;
    }
    .keyword-item .del-btn:hover { color: #e53935; }
    .empty { text-align: center; color: #aaa; font-size: 14px; padding: 24px 0; }

    /* Settings */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 13px; font-weight: 600; color: #555; }
    .form-group input, .form-group select {
      padding: 10px 14px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 14px; outline: none;
      transition: border 0.2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: #06c755; }
    .save-row { margin-top: 20px; display: flex; justify-content: flex-end; }

    /* Preview */
    .preview-box {
      background: #f0f0f0; border-radius: 12px;
      padding: 16px; font-size: 13px;
      line-height: 1.7; white-space: pre-wrap;
      border: 1px solid #ddd; color: #333;
      margin-top: 16px;
    }
    .preview-label { font-size: 12px; color: #aaa; margin-bottom: 6px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #323232; color: white;
      padding: 10px 20px; border-radius: 8px;
      font-size: 14px; opacity: 0; transition: all 0.3s; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: #06c755; }
    .toast.error { background: #e53935; }
  </style>
</head>
<body>

<header>
  <h1>EHP Chatbot — Admin</h1>
  <span>จัดการระบบ Chatbot</span>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('keywords', this)">🔑 Keywords</button>
  <button class="tab-btn" onclick="switchTab('settings', this)">⚙️ ข้อมูลตอบกลับ</button>
</div>

<main>

  <!-- TAB: Keywords -->
  <div id="tab-keywords" class="tab-panel active">
    <div class="card">
      <h2>เพิ่ม Keyword ที่ทำให้เปิด Ticket อัตโนมัติ</h2>
      <div class="add-row">
        <input id="new-keyword" type="text" placeholder="เช่น พบปัญหา, ชำระเงินไม่ได้" />
        <button class="btn-green" onclick="addKeyword()">+ เพิ่ม</button>
      </div>
      <h2>Keyword ทั้งหมด (<span id="count">0</span>)</h2>
      <div id="keyword-list"><div class="empty">กำลังโหลด...</div></div>
    </div>
  </div>

  <!-- TAB: Settings -->
  <div id="tab-settings" class="tab-panel">
    <div class="card">
      <h2>กำหนดข้อมูลในข้อความตอบกลับ</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Service</label>
          <input id="s-service" type="text" placeholder="EHP CIS" />
        </div>
        <div class="form-group">
          <label>Category</label>
          <input id="s-category" type="text" placeholder="ปัญหาการใช้งานทั่วไป" />
        </div>
        <div class="form-group">
          <label>Sub Category</label>
          <input id="s-subCategory" type="text" placeholder="การใช้งานทั่วไป" />
        </div>
        <div class="form-group">
          <label>สถานะเริ่มต้น</label>
          <select id="s-defaultStatus">
            <option value="กำลังดำเนินการ">กำลังดำเนินการ</option>
            <option value="รอดำเนินการ">รอดำเนินการ</option>
            <option value="รับเรื่องแล้ว">รับเรื่องแล้ว</option>
          </select>
        </div>
        <div class="form-group full">
          <label>ข้อความต้อนรับ (แสดงก่อนชื่อลูกค้า)</label>
          <input id="s-welcomeMessage" type="text" placeholder="รับเรื่องแล้วครับ คุณ" />
        </div>
      </div>

      <div class="preview-label" style="margin-top:20px;">ตัวอย่างข้อความที่ Bot จะส่ง:</div>
      <div class="preview-box" id="preview">กำลังโหลด...</div>

      <div class="save-row">
        <button class="btn-green" onclick="saveSettings()">💾 บันทึกการตั้งค่า</button>
      </div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  // ── Keywords ──────────────────────────────────────
  async function loadKeywords() {
    const res = await fetch('/keywords');
    const keywords = await res.json();
    document.getElementById('count').textContent = keywords.length;
    const list = document.getElementById('keyword-list');
    if (!keywords.length) { list.innerHTML = '<div class="empty">ยังไม่มี Keyword</div>'; return; }
    list.innerHTML = keywords.map((kw, i) => `
      <div class="keyword-item">
        <span>${escHtml(kw)}<span class="badge">AUTO TICKET</span></span>
        <button class="del-btn" onclick="deleteKeyword(${i})">×</button>
      </div>`).join('');
  }

  async function addKeyword() {
    const input = document.getElementById('new-keyword');
    const kw = input.value.trim();
    if (!kw) return;
    const res = await fetch('/keywords', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keyword: kw }),
    });
    if (res.ok) { input.value = ''; await loadKeywords(); showToast(`เพิ่ม "${kw}" แล้ว`, 'success'); }
    else { const e = await res.json(); showToast(e.error || 'เกิดข้อผิดพลาด', 'error'); }
  }

  async function deleteKeyword(index) {
    if (!confirm('ต้องการลบ Keyword นี้ใช่ไหม?')) return;
    await fetch(`/keywords/${index}`, { method: 'DELETE' });
    await loadKeywords();
    showToast('ลบ Keyword แล้ว', 'success');
  }

  // ── Settings ──────────────────────────────────────
  async function loadSettings() {
    const res = await fetch('/settings');
    const s = await res.json();
    document.getElementById('s-service').value = s.service || '';
    document.getElementById('s-category').value = s.category || '';
    document.getElementById('s-subCategory').value = s.subCategory || '';
    document.getElementById('s-defaultStatus').value = s.defaultStatus || 'กำลังดำเนินการ';
    document.getElementById('s-welcomeMessage').value = s.welcomeMessage || '';
    updatePreview(s);
  }

  async function saveSettings() {
    const body = {
      service: document.getElementById('s-service').value.trim(),
      category: document.getElementById('s-category').value.trim(),
      subCategory: document.getElementById('s-subCategory').value.trim(),
      defaultStatus: document.getElementById('s-defaultStatus').value,
      welcomeMessage: document.getElementById('s-welcomeMessage').value.trim(),
    };
    const res = await fetch('/settings', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (res.ok) { updatePreview(body); showToast('บันทึกการตั้งค่าแล้ว', 'success'); }
    else showToast('เกิดข้อผิดพลาด', 'error');
  }

  function updatePreview(s) {
    document.getElementById('preview').textContent =
      `📋 Ticket: #001\n` +
      `🔴 ปัญหา: เข้าระบบไม่ได้\n` +
      `👤 ผู้แจ้ง: คุณสมชาย\n` +
      `🏢 Service: ${s.service || '-'}\n` +
      `📂 Category: ${s.category || '-'}\n` +
      `📌 Sub Category: ${s.subCategory || '-'}\n` +
      `⚙️ สถานะ: ${s.defaultStatus || '-'}\n` +
      `🔧 วิธีการแก้ไข: -\n` +
      `📅 รับเรื่องวันที่: ${new Date().toLocaleString('th-TH')}\n\n` +
      `ติดตามสถานะได้โดยพิมพ์:\n"ตรวจสอบ #001"`;
  }

  ['s-service','s-category','s-subCategory','s-defaultStatus','s-welcomeMessage'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', () => saveSettings());
  });

  // ── Helpers ──────────────────────────────────────
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast show ${type}`;
    setTimeout(() => { t.className = 'toast'; }, 2500);
  }
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('new-keyword').addEventListener('keydown', e => {
    if (e.key === 'Enter') addKeyword();
  });

  loadKeywords();
  loadSettings();
</script>
</body>
</html>
